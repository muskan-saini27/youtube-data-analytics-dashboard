<!DOCTYPE html>

<html>

<head>

<title>

YouTube Content Intelligence Dashboard

</title>

<meta charset="UTF-8">

<meta name="viewport"

content="width=device-width, initial-scale=1">

<link

href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"

rel="stylesheet">

<link

rel="stylesheet"

href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="upload-container">

<div class="upload-card">

<div class="youtube-logo">

▶

</div>

<h1>

YouTube Content Intelligence Dashboard

</h1>

<p>

Upload your YouTube dataset

and discover business insights,

viral videos, trends and

future predictions.

</p>

<form

action="/analyze"

method="POST"

enctype="multipart/form-data"

>

<div class="file-box">

<input

type="file"

name="file"

accept=".csv"

required

>

</div>

<button

class="analyze-btn"

type="submit"

>

Analyze Dataset

</button>

</form>

<div class="features">

<div>

📊 KPI Dashboard

</div>

<div>

🔥 Viral Analysis

</div>

<div>

📈 Trends

</div>

<div>

🤖 Machine Learning

</div>

</div>

</div>

</div>

</body>

</html>
